name: Bug report
description: Signaler un bug
title: "[Bug] "
labels:
  - type:bug
  - status:ready
body:
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Explique clairement le problème rencontré.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Faire...
        3. Constater...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Résultat obtenu
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte technique
      placeholder: Version Node, navigateur, environnement, logs utiles...
