services:
  postgres:
    image: postgres:16-alpine
    container_name: epolia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: epolia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - epolia_postgres_data:/var/lib/postgresql/data

volumes:
  epolia_postgres_data:
